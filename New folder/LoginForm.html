<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Form</title>
    <style>
        :root{
            --panel: rgba(0, 0, 0, 0.62);
            --panel-border: rgba(255, 255, 255, 0.22);
            --text: #ffffff;
            --accent: #f3c66b;
        }

        *{
            box-sizing: border-box;
        }

        body{
            margin: 0;
            min-height: 100vh;
            background-image: url(ferrari9.webp);
            background-repeat: no-repeat;
            background-size: cover;
            background-position: center;
            font-family: Arial, Helvetica, sans-serif;
            display: grid;
            place-items: center;
            color: var(--text);
        }

        body::before{
            content: "";
            position: fixed;
            inset: 0;
            background: linear-gradient(135deg, rgba(0, 0, 0, 0.68), rgba(0, 0, 0, 0.25));
            pointer-events: none;
        }

        #Box{ 
            position: relative;
            width: min(92vw, 460px);
            padding: 32px 28px;
            border: 1px solid var(--panel-border);
            border-radius: 24px;
            background: var(--panel);
            backdrop-filter: blur(10px);
            box-shadow: 0 24px 60px rgba(0, 0, 0, 0.45);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            z-index: 1;
            text-align: center;
        }

        #Box h1{
            margin: 0;
            font-size: clamp(2rem, 4vw, 2.6rem);
            letter-spacing: 0.5px;
        }

        #Box p{
            margin: 0;
            color: rgba(255, 255, 255, 0.8);
            font-size: 0.98rem;
        }

        form{
            width: 100%;
        }

        table{
            width: 100%;
            border-collapse: collapse;
        }

        td{
            padding: 10px 0;
            vertical-align: middle;
        }

        td:first-child{
            width: 34%;
            padding-right: 12px;
            text-align: left;
            font-size: 1rem;
        }

        #Box input{
           width: 100%;
           height: 46px;
           padding: 0 16px;
           border: 1px solid rgba(255, 255, 255, 0.24);
           border-radius: 16px;
           background-color: rgba(0, 0, 0, 0.42);
           color: var(--text);
           outline: none;
        }

        #Box input:focus{
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(243, 198, 107, 0.2);
        }

        #Box button{
            width: 100%;
            height: 48px;
            background: linear-gradient(135deg, #111111, #2b2b2b);
            color: white;
            font-size: 1rem;
            border: 1px solid rgba(255, 255, 255, 0.28);
            border-radius: 16px;
            cursor: pointer;
            transition: transform 0.18s ease, box-shadow 0.18s ease;
            margin-top: 8px;
        }

        #Box button:hover{
            transform: translateY(-1px);
            box-shadow: 0 12px 24px rgba(0, 0, 0, 0.28);
        }

        ::placeholder{
            color: white;
            font-size: 0.95rem;
        }

        @media (max-width: 560px){
            #Box{
                padding: 24px 18px;
                border-radius: 20px;
            }

            td{
                display: block;
                width: 100%;
                padding: 6px 0;
            }

            td:first-child{
                width: 100%;
                padding-right: 0;
                padding-top: 10px;
            }
        }
    </style>
</head>
<body>
    <div id="Box">
        <h1>Login Form</h1>
        <p>Enter your details to continue.</p>
    <form>
        <table>
            <tr>
                <td><label for="na">Name</label></td>
                <td><input type="text" id="na" placeholder="Enter Name" required></td>
            </tr>
            <tr>
                <td><label for="nu">Number</label></td>
                <td><input type="tel" id="nu" placeholder="Enter Number" required></td>
            </tr>
            <tr>
                <td><label for="em">E-mail</label></td>
                <td><input type="email" id="em" placeholder="Enter Email" required></td>
            </tr>
            <tr>
                <td><button>Submit</button></td>
                <td></td>
            </tr>
        </table>
    </form>
    </div>
</body>
</html>
